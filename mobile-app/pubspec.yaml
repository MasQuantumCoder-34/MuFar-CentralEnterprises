name: central_enterprises
description: Central Enterprises - B2B Order Management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  provider: ^6.1.0
  flutter_secure_storage: ^9.2.0
  intl: ^0.19.0
  cached_network_image: ^3.3.0
  shared_preferences: ^2.2.0
  fl_chart: ^0.69.0
  image_picker: ^1.2.2
  http_parser: ^4.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/central_enterprises_logo.jpeg
    - assets/app-splash-screen.jpeg
    - assets/app-logo.jpeg
    - assets/login-page.jpeg

flutter_launcher_icons:
  android: true
  image_path: "assets/app-logo.jpeg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/app-logo.jpeg"
  adaptive_icon_foreground_inset: 20
