name: Mufar Commerce CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & TypeCheck
    runs-on: ubuntu-latest

    strategy:
      matrix:
        package: [shared, backend, admin-panel]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.package }}
        run: npm ci

      - name: Build shared package
        if: matrix.package == 'shared'
        working-directory: shared
        run: npm run build

      - name: TypeScript check
        working-directory: ${{ matrix.package }}
        run: npx tsc --noEmit

      - name: Lint
        working-directory: ${{ matrix.package }}
        run: npx eslint src/ --ext .ts,.tsx 2>/dev/null || echo "No eslint config"

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build shared
        working-directory: shared
        run: npm ci && npm run build

      - name: Run tests
        working-directory: backend
        run: npm test 2>/dev/null || echo "No tests configured"
        env:
          MONGODB_URI: mongodb://localhost:27017/mufar_commerce_test
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          NODE_ENV: test

  build-admin:
    name: Build Admin Panel
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        working-directory: admin-panel
        run: npm ci

      - name: Build
        working-directory: admin-panel
        run: npm run build

  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: [backend-tests, build-admin]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
